<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamadhanAI — Smart Complaint Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: #1a1a2e;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo {
            color: white;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .navbar .logo span { color: #4CAF50; }
        .navbar a {
            color: #ccc;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .navbar a:hover { color: white; }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        .hero h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .hero h1 span { color: #4CAF50; }
        .hero p {
            color: #aaa;
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* FORM CARD */
        .form-container {
            max-width: 600px;
            margin: -30px auto 40px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #4CAF50;
        }
        .form-group textarea { resize: vertical; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #43a047; }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Civic<span>AI</span></div>
    <div>
        <a href="/">Submit Complaint</a>
        <a href="/complaints">Dashboard</a>
        <a href="/map">Hotspot Map</a>
    </div>
</nav>

<div class="hero">
    <h1>Smart <span>Complaint</span> Prioritization</h1>
    <p>AI-powered civic complaint management. Submit your issue and let AI analyze and prioritize it instantly.</p>
</div>

<div class="form-container">
    <h2>📝 Submit a Complaint</h2>
    <form action="/submit" method="POST">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required/>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" placeholder="e.g. MG Road, Bankura" required/>
        </div>
        <div class="form-group">
            <label>Complaint Description</label>
            <textarea name="complaint" rows="5" placeholder="Describe your complaint in detail..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">🚀 Submit & Analyze with AI</button>
    </form>
</div>

<div class="footer">
    SamadhanAI © 2026 — Powered by Groq LLaMA AI
</div>

</body>
</html>
